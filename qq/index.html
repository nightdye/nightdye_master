<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://qq.nightdye.cn/qq/images/night.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <title>夜染快捷链接</title>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title"><i class="fas fa-book"></i> 目录导航</span>
            <span class="closebtn" id="sidebarCloseBtn">&times;</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <!-- 动态加载导航项 -->
        </nav>
    </div>

    <span id="toggleSidebar" class="toggle-sidebar-btn">&#9654;</span>

<div id="main-content">
    <header>
    <div class="header-container">
        <img id="clean" src="https://qq.nightdye.cn/qq/images/night_logo_1.png" width="80" height="80" style="border-radius: 50%;">
        <h1>QQ快捷链接跳转</h1>
    </div>
    <!-- ✅ 移除内联脚本，合并到主脚本中 -->
    </header>
    <!-- 顶部工具栏 -->
    <div class="toolbar">
        <div class="toolbar-left">
            <a class="theme-switch" title="切换主题"><i class="fas fa-adjust"></i></a>
            <a class="view-switch" id="viewSwitch" title="切换视图"><i class="fas fa-th-large"></i></a>
            <a class="collapse-all" id="collapseAll" title="全部折叠"><i class="fas fa-compress-alt"></i></a>
        </div>
        <div class="toolbar-right">
            <a class="toolbar-btn" href="../level/index.html"><i class="fas fa-calculator"></i> 等级计算</a>
            <a class="toolbar-btn" href="found1.html"><i class="fas fa-search"></i> QQ查找</a>
            <a class="toolbar-btn" href="n.html"><i class="fas fa-user"></i> 作者</a>
        </div>
    </div>
        <main>
            <div id="myModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <span class="close" id="modalCloseBtn">&times;</span>
                        <h2>公告</h2>
                    </div>
                    <div class="modal-body">
                        <p><i class="fas fa-lightbulb"></i> 如果以下链接打开无法跳转或者白屏，请使用空间登录或者浏览器打开本网站再进行尝试！</p>
                        <p><i class="fas fa-star"></i> PS: 点击左上角的头像可以清空页面缓存进行刷新查看是否有更新的链接。</p>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-confirm" id="modalConfirmBtn">确认</button>
                    </div>
                </div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="搜索链接...">
                <span class="search-clear" id="searchClear" title="清空">&times;</span>
            </div>
            <!-- 分类快速筛选标签 -->
            <div class="category-tags" id="categoryTags">
                <!-- 动态加载分类标签 -->
            </div>
            <div class="category-container">
            </div>
        </main>
    <div id="backToTop" class="back-to-top">&#9650;</div>
</div>
<script src="https://cdn.nightdye.cn/loader.js"></script>
</body>
</html>
