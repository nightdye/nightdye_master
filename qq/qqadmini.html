<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.nightdye.cn/login/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://qq.nightdye.cn/qq/images/night.ico" type="image/x-icon">
    <title>QQ链接管理后台</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box}:root{--primary:#6366f1;--primary-dark:#4f46e5;--primary-light:#818cf8;--primary-glow:rgba(99,102,241,0.4);--accent:#8b5cf6;--accent-light:#a78bfa;--dark-bg:#0f1219;--dark-secondary:#161b26;--dark-card:#1c2333;--dark-border:#2d3748;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--success-color:#10b981;--error-color:#ef4444;--warning-color:#f59e0b;--info-color:#3b82f6}body{font-family:'Noto Sans SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--dark-bg);min-height:100vh;color:var(--text-primary);line-height:1.6}body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 0%,rgba(99,102,241,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(139,92,246,0.1) 0%,transparent 50%);pointer-events:none;z-index:0}.container{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:30px 20px}.header{text-align:center;margin-bottom:30px;padding:30px;background:linear-gradient(135deg,var(--dark-card) 0%,var(--dark-secondary) 100%);border-radius:16px;border:1px solid var(--dark-border);position:relative;overflow:hidden}.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent),var(--primary-light))}.header h1{font-size:24px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}.header h1 i{color:var(--primary-light);filter:drop-shadow(0 0 8px var(--primary-glow))}.header p{color:var(--text-secondary);font-size:14px}.card{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,0.25)}.card-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid var(--dark-border)}.card-title i{color:var(--primary-light);font-size:18px}.tabs{display:flex;gap:6px;margin-bottom:20px;background:rgba(0,0,0,0.2);padding:5px;border-radius:10px;flex-wrap:wrap}.tab{flex:1;min-width:100px;padding:10px 16px;background:transparent;border:none;border-radius:8px;color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s ease}.tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 10px var(--primary-glow)}.tab:active:not(.active){background:rgba(99,102,241,0.1)}@media (hover:hover){.tab:not(.active):hover{background:rgba(99,102,241,0.1);color:var(--text-primary)}}.form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:8px;color:var(--text-secondary);font-size:13px;font-weight:500}.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:rgba(0,0,0,0.25);border:1px solid var(--dark-border);border-radius:8px;color:var(--text-primary);font-size:14px;font-family:inherit;transition:all 0.2s ease}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);background:rgba(99,102,241,0.05);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-secondary);opacity:0.5}.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{padding:12px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform 0.15s ease,box-shadow 0.15s ease}.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 4px 12px var(--primary-glow)}.btn-secondary{background:rgba(255,255,255,0.08);color:var(--text-primary);border:1px solid var(--dark-border)}.btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,0.3)}.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,0.3)}.btn-sm{padding:8px 14px;font-size:12px}.btn:active:not(:disabled){transform:scale(0.97)}.btn:disabled{opacity:0.5;cursor:not-allowed}.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}.stat-item{padding:16px 12px;background:rgba(0,0,0,0.2);border:1px solid var(--dark-border);border-radius:10px;text-align:center}.stat-item:nth-child(1){border-top:2px solid var(--primary)}.stat-item:nth-child(2){border-top:2px solid var(--success-color)}.stat-item:nth-child(3){border-top:2px solid var(--warning-color)}.stat-item:nth-child(4){border-top:2px solid var(--info-color)}.stat-value{font-size:26px;font-weight:700;color:var(--text-primary)}.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px}.data-table{width:100%;border-collapse:collapse;margin-top:16px}.data-table th,.data-table td{padding:12px;text-align:left;border-bottom:1px solid var(--dark-border)}.data-table th{background:rgba(0,0,0,0.2);color:var(--text-secondary);font-weight:600;font-size:13px}.data-table td{color:var(--text-primary);font-size:14px}.data-table tr:hover{background:rgba(99,102,241,0.05)}.data-table .url-cell{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--info-color)}.data-table .actions{display:flex;gap:6px}.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}.badge-active{background:rgba(16,185,129,0.15);color:var(--success-color)}.badge-inactive{background:rgba(239,68,68,0.15);color:var(--error-color)}.search-box{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}.search-box input{flex:1;min-width:200px}.search-box select{min-width:150px}.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}.modal-overlay.show{display:flex}.modal{background:var(--dark-card);border:1px solid var(--dark-border);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.5)}.modal-header{padding:20px 24px;border-bottom:1px solid var(--dark-border);display:flex;justify-content:space-between;align-items:center}.modal-header h3{font-size:18px;color:var(--text-primary)}.modal-close{background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px}.modal-body{padding:24px}.modal-footer{padding:16px 24px;border-top:1px solid var(--dark-border);display:flex;justify-content:flex-end;gap:10px}.pagination{display:flex;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap}.pagination button{padding:8px 14px;background:rgba(255,255,255,0.08);border:1px solid var(--dark-border);border-radius:6px;color:var(--text-primary);cursor:pointer;font-size:13px}.pagination button.active{background:var(--primary);border-color:var(--primary)}.pagination button:disabled{opacity:0.3;cursor:not-allowed}.log-container{max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.3);border-radius:8px;padding:14px;font-family:'Consolas','Monaco',monospace;font-size:12px}.log-entry{padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:10px;align-items:flex-start}.log-entry:last-child{border-bottom:none}.log-time{color:var(--text-secondary);white-space:nowrap;opacity:0.7}.log-info{color:var(--info-color)}.log-success{color:var(--success-color)}.log-error{color:var(--error-color)}.log-warning{color:var(--warning-color)}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--dark-secondary);border-radius:3px}::-webkit-scrollbar-thumb{background:var(--dark-border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--primary)}.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media (max-width:768px){.container{padding:20px 15px}.header{padding:24px 20px}.header h1{font-size:20px}.card{padding:20px}.form-row{grid-template-columns:1fr}.btn-group{flex-direction:column}.btn{width:100%}.search-box{flex-direction:column}.search-box input,.search-box select{width:100%}.data-table{display:block;overflow-x:auto}}
    </style>
</head>
<body>
    <div class="container" id="main-content" style="display: none;">
        <div class="header">
            <h1><i class="fas fa-link"></i>QQ链接管理后台</h1>
            <p>管理QQ快捷链接的分类和链接数据</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="statCategories">0</div>
                <div class="stat-label"><i class="fas fa-folder"></i> 分类数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statLinks">0</div>
                <div class="stat-label"><i class="fas fa-link"></i> 链接数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statActive">0</div>
                <div class="stat-label"><i class="fas fa-check-circle"></i> 已启用</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statClicks">0</div>
                <div class="stat-label"><i class="fas fa-mouse-pointer"></i> 总点击</div>
            </div>
        </div>

        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab active" data-tab="links"><i class="fas fa-link"></i> 链接管理</button>
            <button class="tab" data-tab="categories"><i class="fas fa-folder"></i> 分类管理</button>
            <button class="tab" data-tab="batch"><i class="fas fa-upload"></i> 批量导入</button>
        </div>

        <!-- 链接管理 -->
        <div class="card tab-panel active" id="panel-links">
            <div class="card-title">
                <i class="fas fa-list"></i>
                链接列表
                <button class="btn btn-primary btn-sm" id="btnAddLink" style="margin-left:auto">
                    <i class="fas fa-plus"></i> 添加链接
                </button>
            </div>

            <div class="search-box">
                <input type="text" id="searchLink" placeholder="搜索链接文本或URL...">
                <select id="filterCategory">
                    <option value="">全部分类</option>
                </select>
                <select id="filterStatus">
                    <option value="">全部状态</option>
                    <option value="1">已启用</option>
                    <option value="0">已禁用</option>
                </select>
            </div>

            <div id="linksTableContainer">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>链接文本</th>
                            <th>URL</th>
                            <th>分类</th>
                            <th>状态</th>
                            <th>点击数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-secondary)">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="linksPagination"></div>
        </div>

        <!-- 分类管理 -->
        <div class="card tab-panel" id="panel-categories" style="display:none">
            <div class="card-title">
                <i class="fas fa-folder-open"></i>
                分类列表
                <button class="btn btn-primary btn-sm" id="btnAddCategory" style="margin-left:auto">
                    <i class="fas fa-plus"></i> 添加分类
                </button>
            </div>

            <div id="categoriesTableContainer">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标识符</th>
                            <th>标题</th>
                            <th>图标</th>
                            <th>排序</th>
                            <th>状态</th>
                            <th>链接数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody">
                        <tr><td colspan="8" style="text-align:center;color:var(--text-secondary)">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 批量导入 -->
        <div class="card tab-panel" id="panel-batch" style="display:none">
            <div class="card-title">
                <i class="fas fa-file-import"></i>
                批量导入链接
            </div>

            <div class="form-group">
                <label>选择分类</label>
                <select id="batchCategory">
                    <option value="">请选择分类</option>
                </select>
            </div>

            <div class="form-group">
                <label>链接数据（每行一条，格式：链接文本|URL）</label>
                <textarea id="batchData" rows="10" placeholder="示例：
大会员官网|https://h5.qzone.qq.com/bigVip/home
SVIP福利社|https://club.vip.qq.com/qqvip/benefits/home"></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnBatchImport">
                    <i class="fas fa-upload"></i> 开始导入
                </button>
                <button class="btn btn-secondary" id="btnClearBatch">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-terminal"></i>
                操作日志
            </div>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="log-time">[系统]</span>
                    <span class="log-info"><i class="fas fa-check-circle"></i> 后台初始化完成</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 链接编辑弹窗 -->
    <div class="modal-overlay" id="linkModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="linkModalTitle">添加链接</h3>
                <button class="modal-close" id="closeLinkModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="linkId">
                <div class="form-group">
                    <label>链接文本 *</label>
                    <input type="text" id="linkText" placeholder="输入链接显示文本">
                </div>
                <div class="form-group">
                    <label>链接URL *</label>
                    <input type="text" id="linkUrl" placeholder="输入链接地址">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>所属分类 *</label>
                        <select id="linkCategory"></select>
                    </div>
                    <div class="form-group">
                        <label>排序权重</label>
                        <input type="number" id="linkSort" value="0" placeholder="越小越靠前">
                    </div>
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="linkDesc" rows="2" placeholder="输入链接描述"></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="linkActive" checked> 启用链接
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelLinkModal">取消</button>
                <button class="btn btn-primary" id="saveLinkModal">保存</button>
            </div>
        </div>
    </div>

    <!-- 分类编辑弹窗 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="categoryModalTitle">添加分类</h3>
                <button class="modal-close" id="closeCategoryModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="categoryId">
                <div class="form-row">
                    <div class="form-group">
                        <label>分类标识符 *</label>
                        <input type="text" id="categorySectionId" placeholder="如: section1">
                    </div>
                    <div class="form-group">
                        <label>分类标题 *</label>
                        <input type="text" id="categoryTitle" placeholder="如: SVIP链接">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>图标Class</label>
                        <input type="text" id="categoryIcon" value="fas fa-link" placeholder="Font Awesome图标类">
                    </div>
                    <div class="form-group">
                        <label>排序权重</label>
                        <input type="number" id="categorySort" value="0" placeholder="越小越靠前">
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="categoryActive" checked> 启用分类
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelCategoryModal">取消</button>
                <button class="btn btn-primary" id="saveCategoryModal">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.nightdye.cn/loader.js"></script>
    <script>
        NightAuth.protectPage();
        document.getElementById('main-content').style.display = 'block';
    </script>
</body>
</html>
