<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.nightdye.cn/login/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://qq.nightdye.cn/qq/images/night.ico" type="image/x-icon">
    <title>QQ链接管理后台</title>
    <link rel="stylesheet" href="css/admini.css">
    </head>
<body>
    <div class="container" id="main-content" style="display: none;">
        <div class="header">
            <h1><i class="fas fa-link"></i>QQ链接管理后台</h1>
            <p>管理QQ快捷链接的分类和链接数据</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="statCategories">0</div>
                <div class="stat-label"><i class="fas fa-folder"></i> 分类数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statLinks">0</div>
                <div class="stat-label"><i class="fas fa-link"></i> 链接数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statActive">0</div>
                <div class="stat-label"><i class="fas fa-check-circle"></i> 已启用</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statClicks">0</div>
                <div class="stat-label"><i class="fas fa-mouse-pointer"></i> 总点击</div>
            </div>
        </div>

        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab active" data-tab="links"><i class="fas fa-link"></i> 链接管理</button>
            <button class="tab" data-tab="categories"><i class="fas fa-folder"></i> 分类管理</button>
            <button class="tab" data-tab="batch"><i class="fas fa-upload"></i> 批量导入</button>
        </div>

        <!-- 链接管理 -->
        <div class="card tab-panel active" id="panel-links">
            <div class="card-title">
                <i class="fas fa-list"></i>
                链接列表
                <button class="btn btn-primary btn-sm" id="btnAddLink" style="margin-left:auto">
                    <i class="fas fa-plus"></i> 添加链接
                </button>
            </div>

            <div class="search-box">
                <input type="text" id="searchLink" placeholder="搜索链接文本或URL...">
                <select id="filterCategory">
                    <option value="">全部分类</option>
                </select>
                <select id="filterStatus">
                    <option value="">全部状态</option>
                    <option value="1">已启用</option>
                    <option value="0">已禁用</option>
                </select>
            </div>

            <div id="linksTableContainer">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>链接文本</th>
                            <th>URL</th>
                            <th>分类</th>
                            <th>状态</th>
                            <th>点击数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-secondary)">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="linksPagination"></div>
        </div>

        <!-- 分类管理 -->
        <div class="card tab-panel" id="panel-categories">
            <div class="card-title">
                <i class="fas fa-folder-open"></i>
                分类列表
                <button class="btn btn-primary btn-sm" id="btnAddCategory" style="margin-left:auto">
                    <i class="fas fa-plus"></i> 添加分类
                </button>
            </div>

            <div id="categoriesTableContainer">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标识符</th>
                            <th>标题</th>
                            <th>图标</th>
                            <th>排序</th>
                            <th>状态</th>
                            <th>链接数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody">
                        <tr><td colspan="8" style="text-align:center;color:var(--text-secondary)">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 批量导入 -->
        <div class="card tab-panel" id="panel-batch">
            <div class="card-title">
                <i class="fas fa-file-import"></i>
                批量导入链接
            </div>

            <div class="form-group">
                <label>选择分类</label>
                <select id="batchCategory">
                    <option value="">请选择分类</option>
                </select>
            </div>

            <div class="form-group">
                <label>链接数据（每行一条，格式：链接文本|URL）</label>
                <textarea id="batchData" rows="10" placeholder="示例：
大会员官网|https://h5.qzone.qq.com/bigVip/home
SVIP福利社|https://club.vip.qq.com/qqvip/benefits/home"></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnBatchImport">
                    <i class="fas fa-upload"></i> 开始导入
                </button>
                <button class="btn btn-secondary" id="btnClearBatch">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-terminal"></i>
                操作日志
            </div>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="log-time">[系统]</span>
                    <span class="log-info"><i class="fas fa-check-circle"></i> 后台初始化完成</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 链接编辑弹窗 -->
    <div class="modal-overlay" id="linkModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="linkModalTitle">添加链接</h3>
                <button class="modal-close" id="closeLinkModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="linkId">
                <div class="form-group">
                    <label>链接文本 *</label>
                    <input type="text" id="linkText" placeholder="输入链接显示文本">
                </div>
                <div class="form-group">
                    <label>链接URL *</label>
                    <input type="text" id="linkUrl" placeholder="输入链接地址">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>所属分类 *</label>
                        <select id="linkCategory"></select>
                    </div>
                    <div class="form-group">
                        <label>排序权重</label>
                        <input type="number" id="linkSort" value="0" placeholder="越小越靠前">
                    </div>
                </div>
                <div class="form-group">
                    <label>描述（可选）</label>
                    <textarea id="linkDesc" rows="2" placeholder="输入链接描述"></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="linkActive" checked> 启用链接
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelLinkModal">取消</button>
                <button class="btn btn-primary" id="saveLinkModal">保存</button>
            </div>
        </div>
    </div>

    <!-- 分类编辑弹窗 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="categoryModalTitle">添加分类</h3>
                <button class="modal-close" id="closeCategoryModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="categoryId">
                <div class="form-row">
                    <div class="form-group">
                        <label>分类标识符 *</label>
                        <input type="text" id="categorySectionId" placeholder="如: section1">
                    </div>
                    <div class="form-group">
                        <label>分类标题 *</label>
                        <input type="text" id="categoryTitle" placeholder="如: SVIP链接">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>图标Class</label>
                        <input type="text" id="categoryIcon" value="fas fa-link" placeholder="Font Awesome图标类">
                    </div>
                    <div class="form-group">
                        <label>排序权重</label>
                        <input type="number" id="categorySort" value="0" placeholder="越小越靠前">
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="categoryActive" checked> 启用分类
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelCategoryModal">取消</button>
                <button class="btn btn-primary" id="saveCategoryModal">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.nightdye.cn/loader.js"></script>
    <script>
        NightAuth.protectPage();
        document.getElementById('main-content').style.display = 'block';
    </script>
</body>
</html>
