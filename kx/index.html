<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="https://nightdye.guokevr.cn/qq/images/night.ico" type="image/x-icon">
  <link rel="stylesheet" href="kx.css">
  <title>细体字转换器</title>
</head>
<body>

  <div class="container">
    <header>
        <img src="https://nightdye.guokevr.cn/qq/images/night_logo_1.png" alt="Logo" class="logo">
      <h1>细体字转换器</h1>
    </header>
    
    <main>
      <p class="desc">将汉字转换为康熙部首细体字，可用于 QQ 昵称、签名等场景。支持 214 个康熙部首及其常见变体。</p>

      <div class="input-group">
        <label class="input-label">从部首列表选择</label>
        <select id="radicalSelect" aria-label="选择部首"></select>
      </div>

      <div class="divider"><span>或</span></div>

      <div class="input-group">
        <label class="input-label">直接输入汉字</label>
        <div class="manual-input-container">
          <input type="text" id="manualInput" placeholder="输入一个汉字即可转换" maxlength="1">
        </div>
      </div>

      <div class="result-area">
        <div class="result" id="resultLabel" title="点击可选中文字"></div>
        <button id="copyBtn" class="copy-btn-inline" aria-label="复制结果">复制</button>
      </div>

      <div class="buttons">
        <button id="randomBtn">随机一个</button>
        <button id="exampleBtn" class="example-btn">查看示例</button>
      </div>
    </main>
  </div>
  
  <footer>
      <p>&copy; 2025 夜染之梦 · 细体生成</p>
  </footer>

  <div class="alert-overlay" id="alertOverlay">
    <div class="alert-box">
      <p id="alertMessage"></p>
      <button id="alertCloseBtn">关闭</button>
    </div>
  </div>

  <div class="image-preview-overlay" id="imagePreviewOverlay">
      <div class="image-preview-box">
          <img src="kx.png" alt="示例图片" id="zoomedImage">
      </div>
  </div>

  <script src="https://cdn.nightdye.cn/loader.js"></script>
</body>
</html>
