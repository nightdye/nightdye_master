<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="https://qq.nightdye.cn/qq/images/night.ico" type="image/x-icon">
  <link rel="stylesheet" href="kx.css">
  <title>细体字转换器</title>
</head>
<body>

  <div class="container">
    <header>
        <img src="https://qq.nightdye.cn/qq/images/night_logo_1.png" alt="Logo" class="logo">
      <h1>细体字转换器</h1>
    </header>
    
    <main>
      <p class="desc">将汉字转换为康熙部首细体字，可用于 QQ 昵称、签名等场景。<br>支持 214 个康熙部首及其常见变体。</p>

      <div class="input-section">
        <div class="input-group">
          <label class="input-label">方式一：从列表选择部首</label>
          <div class="input-row">
            <select id="radicalSelect" aria-label="选择部首"></select>
            <button id="randomBtn" class="action-btn action-btn--primary">随机</button>
          </div>
        </div>

        <div class="divider"><span>或</span></div>

        <div class="input-group">
          <label class="input-label">方式二：输入汉字转换</label>
          <div class="input-row">
            <div class="manual-input-container">
              <input type="text" id="manualInput" placeholder="输入汉字，如：心、水、火" maxlength="1">
            </div>
            <button id="convertBtn" class="action-btn action-btn--primary">转换</button>
          </div>
        </div>
      </div>

      <div class="result-area">
        <label class="result-label">转换结果</label>
        <div class="result" id="resultLabel" title="点击可选中文字"></div>
        <button id="copyBtn" class="copy-btn-inline" aria-label="复制结果">复制结果</button>
      </div>

      <div class="buttons">
        <button id="exampleBtn" class="example-btn">查看示例</button>
      </div>
    </main>
  </div>
  
  <footer>
      <p>&copy; 2026 夜染之梦 · 细体生成</p>
  </footer>

  <div class="alert-overlay" id="alertOverlay">
    <div class="alert-box">
      <p id="alertMessage"></p>
      <button id="alertCloseBtn">关闭</button>
    </div>
  </div>

  <div class="image-preview-overlay" id="imagePreviewOverlay">
      <div class="image-preview-box">
          <img src="kx.png" alt="示例图片" id="zoomedImage">
      </div>
  </div>

  <script src="https://cdn.nightdye.cn/loader.js"></script>
</body>
</html>
