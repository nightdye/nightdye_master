<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.nightdye.cn/login/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://qq.nightdye.cn/qq/images/night.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/suitadmini.css">
    <title>QQ套装大全管理</title>
</head>
<body>
    <div class="container" id="main-content" style="display: none;">
        <div class="header">
            <div class="header-logo">
                <img src="https://qq.nightdye.cn/qq/images/night_logo_1.png" alt="Logo">
            </div>
            <h1><i class="fas fa-tshirt"></i> QQ套装大全管理</h1>
            <p>批量抓取和管理套装数据</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label"><i class="fas fa-database"></i> 套装总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statToday">0</div>
                <div class="stat-label"><i class="fas fa-calendar-plus"></i> 今日新增</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statItems">0</div>
                <div class="stat-label"><i class="fas fa-puzzle-piece"></i> 装扮项总数</div>
            </div>
        </div>

        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab active" data-tab="overview"><i class="fas fa-chart-pie"></i> 概览</button>
            <button class="tab" data-tab="fetch"><i class="fas fa-download"></i> 抓取</button>
            <button class="tab" data-tab="cookie"><i class="fas fa-cookie"></i> Cookie</button>
        </div>

        <!-- 概览页 -->
        <div class="card tab-panel active" id="panel-overview">
            <div class="card-title">
                <i class="fas fa-calendar-day"></i>
                今日新增套装
                <div class="title-actions">
                    <select id="listSortOrder">
                        <option value="timeDesc">最新优先</option>
                        <option value="timeAsc">最早优先</option>
                        <option value="priceDesc">价格从高到低</option>
                        <option value="priceAsc">价格从低到高</option>
                    </select>
                    <button class="extra-btn" id="refreshStats">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
            </div>
            <div id="todayList" class="today-list">
                <p style="text-align:center;color:var(--text-secondary);padding:20px">加载中...</p>
            </div>
        </div>

        <!-- 抓取页 -->
        <div class="card tab-panel" id="panel-fetch" style="display:none">
            <div class="card-title">
                <i class="fas fa-download"></i>
                套装抓取
            </div>

            <!-- 单个抓取 -->
            <div class="section">
                <h3><i class="fas fa-hand-pointer"></i> 单个抓取</h3>
                <div class="input-row">
                    <input type="number" id="singleSuitId" placeholder="输入套装ID，如 380" min="1">
                    <button class="btn btn-primary" id="fetchSingleBtn">
                        <i class="fas fa-download"></i> 抓取
                    </button>
                </div>
            </div>

            <!-- 批量抓取 -->
            <div class="section">
                <h3><i class="fas fa-layer-group"></i> 批量抓取</h3>
                <div class="input-row">
                    <input type="text" id="batchSuitIds" placeholder="ID范围或列表，如 1-100 或 1,2,3,5,8">
                    <button class="btn btn-primary" id="fetchBatchBtn">
                        <i class="fas fa-play"></i> 开始
                    </button>
                    <button class="btn btn-danger" id="stopBatchBtn" style="display:none">
                        <i class="fas fa-stop"></i> 停止
                    </button>
                </div>
                <div class="batch-options">
                    <label>
                        <input type="checkbox" id="skipExisting" checked>
                        跳过已存在
                    </label>
                    <label>
                        间隔:
                        <input type="number" id="batchDelay" value="200" min="50" max="10000" style="width:80px"> ms
                    </label>
                </div>
                <div class="progress-bar" id="batchProgress" style="display:none">
                    <div class="progress-fill" id="progressFill"></div>
                    <span class="progress-text" id="progressText">0/0</span>
                </div>
            </div>

            <!-- 抓取结果预览 -->
            <div class="section" id="fetchResultSection" style="display:none">
                <h3><i class="fas fa-eye"></i> 抓取结果</h3>
                <div id="fetchResult" class="fetch-result"></div>
            </div>
        </div>

        <!-- Cookie页 -->
        <div class="card tab-panel" id="panel-cookie" style="display:none">
            <div class="card-title">
                <i class="fas fa-key"></i>
                Cookie 管理
            </div>

            <!-- 登录获取Cookie区域 -->
            <div class="qrlogin-section">
                <div class="qrlogin-header">
                    <span><i class="fas fa-sign-in-alt"></i> 获取Cookie</span>
                </div>

                <!-- 登录方式切换 -->
                <div class="login-mode-tabs">
                    <button class="login-mode-btn active" data-mode="qrcode">
                        <i class="fas fa-qrcode"></i> 扫码登录
                    </button>
                    <button class="login-mode-btn" data-mode="urlscheme">
                        <i class="fas fa-link"></i> 跳转登录
                    </button>
                </div>

                <!-- 扫码模式 -->
                <div class="login-mode-panel" id="qrcodePanel">
                    <div class="qrlogin-actions">
                        <button class="btn btn-sm btn-primary qr-btn" id="btnGetQrCode"><i class="fas fa-sync-alt"></i> 获取二维码</button>
                    </div>
                    <div class="qrlogin-content" id="qrloginContent" style="display:none;">
                        <div class="qrcode-wrapper">
                            <img id="qrcodeImg" src="" alt="QQ扫码登录">
                            <div class="qrcode-mask" id="qrcodeMask" style="display:none;">
                                <i class="fas fa-check-circle"></i>
                                <span id="qrcodeMaskText">已扫码</span>
                            </div>
                        </div>
                        <div class="qrlogin-status" id="qrStatus">请使用QQ扫描二维码</div>
                    </div>
                </div>

                <!-- URL Scheme 模式 -->
                <div class="login-mode-panel" id="urlschemePanel" style="display:none;">
                    <div class="urlscheme-steps">
                        <div class="step-row"><span class="step-num">1</span> 点击生成链接，然后跳转授权</div>
                        <div class="step-row"><span class="step-num">2</span> QQ确认登录后，复制跳转的URL</div>
                        <div class="step-row"><span class="step-num">3</span> 粘贴到下方获取Cookie</div>
                    </div>
                    <div class="urlscheme-generate">
                        <button class="btn btn-sm btn-primary" id="btnGenerateAuthUrl"><i class="fas fa-link"></i> 生成授权链接</button>
                        <a class="btn btn-sm btn-success jump-btn" id="btnJumpToAuth" style="display:none;"><i class="fas fa-external-link-alt"></i> 点击跳转授权</a>
                    </div>
                    <div class="jump-url-input">
                        <textarea id="jumpUrlInput" placeholder="授权成功后，复制浏览器地址栏的URL粘贴到这里..."></textarea>
                        <button class="btn btn-sm btn-success" id="btnParseJumpUrl"><i class="fas fa-sign-in-alt"></i> 获取Cookie</button>
                    </div>
                    <div class="urlscheme-status" id="urlschemeStatus"></div>
                </div>
            </div>

            <div class="divider"><span>或 手动输入</span></div>

            <!-- Cookie状态 -->
            <div class="cookie-status">
                <div id="cookieInfo" class="cookie-info"></div>
            </div>

            <div class="form-group">
                <label>Cookie</label>
                <textarea id="cookieInput" placeholder="粘贴完整Cookie字符串..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="testCookieBtn">
                    <i class="fas fa-vial"></i> 测试
                </button>
                <button class="btn btn-success" id="saveCookieBtn">
                    <i class="fas fa-save"></i> 保存
                </button>
                <button class="btn btn-secondary" id="loadRemoteCookieBtn">
                    <i class="fas fa-cloud-download-alt"></i> 加载远程
                </button>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="card">
            <div class="card-title">
                <i class="fas fa-terminal"></i>
                操作日志
            </div>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="log-time">[系统]</span>
                    <span class="log-info"><i class="fas fa-check-circle"></i> 准备就绪</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.nightdye.cn/loader.js"></script>
    <script>
        NightAuth.protectPage();
        document.getElementById('main-content').style.display = 'block';
    </script>
</body>
</html>
